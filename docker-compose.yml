version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ultrafaceswap_output:/tmp/output
    environment:
      - ULTRAFACESWAP_MODELS=/app/models
      - ULTRAFACESWAP_OUTPUT=/tmp/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  ultrafaceswap_output:
